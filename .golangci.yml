version: "2"
linters:
  enable:
    - modernize
    - govet
    - staticcheck
    - errcheck
    - revive
    - gocritic
    - gosec
    - sqlclosecheck
    - rowserrcheck
    - unconvert
    - misspell
    - depguard
  exclusions:
    rules:
      - path: cmd/bootstrap/main\.go
        linters:
          - gosec
        text: G304
  settings:
    gosec:
      excludes:
        - G115
        - G404
    revive:
      rules:
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true
    depguard:
      rules:
        answer:
          files:
            - "**/internal/answer/**"
          deny:
            - pkg: github.com/maksim-mshp/nornickel-hackathon/internal/catalog
              desc: контексты не импортируют друг друга — только contracts/ и internal/platform
            - pkg: github.com/maksim-mshp/nornickel-hackathon/internal/epistemic
              desc: контексты не импортируют друг друга — только contracts/ и internal/platform
            - pkg: github.com/maksim-mshp/nornickel-hackathon/internal/gateway
              desc: контексты не импортируют друг друга — только contracts/ и internal/platform
            - pkg: github.com/maksim-mshp/nornickel-hackathon/internal/ingest
              desc: контексты не импортируют друг друга — только contracts/ и internal/platform
            - pkg: github.com/maksim-mshp/nornickel-hackathon/internal/llm
              desc: контексты не импортируют друг друга — только contracts/ и internal/platform
            - pkg: github.com/maksim-mshp/nornickel-hackathon/internal/search
              desc: контексты не импортируют друг друга — только contracts/ и internal/platform
