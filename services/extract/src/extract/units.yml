parameters:
  velocity:
    slug: parameter:flow-rate
    name: скорость потока
    si_unit: m/s
    plausible_min: 0.0
    plausible_max: 50.0
  temperature:
    slug: parameter:temperature
    name: температура
    si_unit: K
    plausible_min: 213.15
    plausible_max: 1973.15
  pressure:
    slug: parameter:pressure
    name: давление
    si_unit: Pa
    plausible_min: 0.0
    plausible_max: 1000000000.0
  current_density:
    slug: parameter:current-density
    name: плотность тока
    si_unit: A/m^2
    plausible_min: 0.0
    plausible_max: 100000.0
  ratio:
    slug: parameter:ratio
    name: доля
    si_unit: '%'
    plausible_min: 0.0
    plausible_max: 1000.0
  acidity:
    slug: parameter:ph
    name: показатель pH
    si_unit: pH
    plausible_min: 0.0
    plausible_max: 14.0
  mass_concentration:
    slug: parameter:concentration
    name: концентрация
    si_unit: kg/m^3
    plausible_min: 0.0
    plausible_max: 5000.0
  mass_fraction:
    slug: parameter:content
    name: содержание
    si_unit: kg/kg
    plausible_min: 0.0
    plausible_max: 1.0
  molar_concentration:
    slug: parameter:molar-concentration
    name: молярная концентрация
    si_unit: mol/m^3
    plausible_min: 0.0
    plausible_max: 100000.0
  mass_flow:
    slug: parameter:throughput
    name: производительность
    si_unit: kg/s
    plausible_min: 0.0
    plausible_max: 10000.0
  volumetric_flow:
    slug: parameter:volumetric-flow
    name: объёмный расход
    si_unit: m^3/s
    plausible_min: 0.0
    plausible_max: 1000.0
  specific_energy:
    slug: parameter:energy-intensity
    name: удельный расход энергии
    si_unit: J/kg
    plausible_min: 0.0
    plausible_max: 1000000000.0
  length:
    slug: parameter:size
    name: размер
    si_unit: m
    plausible_min: 0.0
    plausible_max: 10000.0
  duration:
    slug: parameter:duration
    name: длительность
    si_unit: s
    plausible_min: 0.0
    plausible_max: 1000000000.0
  rotational_speed:
    slug: parameter:rotation-speed
    name: частота вращения
    si_unit: 1/s
    plausible_min: 0.0
    plausible_max: 100000.0
  cost:
    slug: parameter:cost
    name: удельная стоимость
    si_unit: currency
    plausible_min: null
    plausible_max: null

