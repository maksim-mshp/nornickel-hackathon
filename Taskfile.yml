version: "3"

vars:
  SERVICES: gateway ingest catalog llm search answer epistemic

tasks:
  infra:
    cmds:
      - docker compose -f deploy/compose/docker-compose.yml up -d postgres nats minio

  infra-down:
    cmds:
      - docker compose -f deploy/compose/docker-compose.yml down

  migrate:
    cmds:
      - migrate -path db/migrations -database "postgres://kmap:kmap@localhost:5432/kmap?sslmode=disable" up

  migrate-down:
    cmds:
      - migrate -path db/migrations -database "postgres://kmap:kmap@localhost:5432/kmap?sslmode=disable" down 1

  gen:
    cmds:
      - buf generate

  lint:
    cmds:
      - golangci-lint run

  lint-fix:
    cmds:
      - golangci-lint run --fix

  test:
    cmds:
      - go test ./...

  build:
    cmds:
      - go build ./...

  dev:
    deps: [infra]
    cmds:
      - task: migrate

  demo:
    cmds:
      - docker compose -f deploy/compose/docker-compose.yml --profile app up -d --build

  tools:
    cmds:
      - go install github.com/bufbuild/buf/cmd/buf@latest
      - go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
      - go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
      - go install github.com/golang-migrate/migrate/v4/cmd/migrate@latest -tags "postgres"
      - go install github.com/evilmartians/lefthook@latest
      - go install gotest.tools/gotestsum@latest
