syntax = "proto3";

package kmap.v1;

import "google/protobuf/struct.proto";

option go_package = "github.com/maksim-mshp/nornickel-hackathon/contracts/gen/go/kmap/v1;kmapv1";

message Principal {
  string user_id = 1;
  repeated string roles = 2;
  string doc_access = 3;
}

message PageRequest {
  string cursor = 1;
  uint32 limit = 2;
  uint32 offset = 3;
}

message PageResponse {
  string next_cursor = 1;
  uint32 total = 2;
}

message DocumentRef {
  string document_id = 1;
  int32 version = 2;
}

message QueryPlan {
  string schema = 1;
  string intent = 2;
  string lang = 3;
  google.protobuf.Struct entities = 4;
  repeated ParamConstraint param_constraints = 5;
  google.protobuf.Struct conditions = 6;
  string geography = 7;
  google.protobuf.Struct time_range = 8;
  google.protobuf.Struct comparison = 9;
  google.protobuf.Struct output = 10;
  google.protobuf.Struct quality = 11;
}

message ParamConstraint {
  string parameter = 1;
  string op = 2;
  double vmin = 3;
  double vmax = 4;
  string unit = 5;
  double vmin_si = 6;
  double vmax_si = 7;
  string si_unit = 8;
}

message EvidencePack {
  repeated Fact facts = 1;
  repeated Chunk chunks = 2;
  repeated google.protobuf.Struct consensus = 3;
  repeated google.protobuf.Struct contradictions = 4;
  repeated google.protobuf.Struct gaps = 5;
  repeated Expert experts = 6;
  Graph graph = 7;
  google.protobuf.Struct stats = 8;
}

message Fact {
  string id = 1;
  string kind = 2;
  google.protobuf.Struct payload = 3;
}

message Chunk {
  string id = 1;
  string document_id = 2;
  int32 version = 3;
  string text = 4;
  int32 page_from = 5;
  int32 page_to = 6;
  google.protobuf.Struct meta = 7;
}

message Expert {
  string person_id = 1;
  string name = 2;
  double weight = 3;
  google.protobuf.Struct evidence = 4;
}

message Graph {
  repeated GraphNode nodes = 1;
  repeated GraphEdge edges = 2;
}

message GraphNode {
  string id = 1;
  string type = 2;
  string label = 3;
  google.protobuf.Struct attrs = 4;
}

message GraphEdge {
  string id = 1;
  string src = 2;
  string dst = 3;
  string rel = 4;
  double weight = 5;
  double confidence = 6;
  bool contradiction = 7;
}
