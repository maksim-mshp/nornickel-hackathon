log:
  level: info
  format: json

postgres:
  dsn: postgres://kmap_app:kmap_app@postgres:5432/kmap?sslmode=disable
  max_conns: 10

nats:
  url: nats://nats:4222

auth:
  signing_key: kmap-dev-principal-signing-key-change-in-prod

s3:
  endpoint: minio:9000
  access_key: kmap
  secret_key: kmap-minio-secret
  use_ssl: false
  buckets:
    raw: kmap-raw
    docir: kmap-docir
    bundles: kmap-bundles
    exports: kmap-exports

parse:
  ocr: "off"

extract:
  llm_addr: llm:9094
  embed_addr: embed:9097
  embed_mode: passage
  embed_batch: 64
  llm_char_limit: 12000
