llm:
  default_provider: yandex
  fallback_providers:
    - do_gradient
  log_prompts: false
  providers:
    yandex:
      base_url: https://ai.api.cloud.yandex.net/v1
      auth_scheme: api-key
    do_gradient:
      base_url: https://inference.do-ai.run/v1
      auth_scheme: bearer
      models:
        gpt-oss-20b/latest: openai-gpt-oss-20b
        gpt-oss-120b/latest: openai-gpt-oss-120b
        deepseek-v4-flash/latest: deepseek-4-flash
        qwen3.6-35b-a3b/latest: alibaba-qwen3-32b
        qwen3-235b-a22b-fp8/latest: qwen3.5-397b-a17b
  allowlist:
    - gpt-oss-20b/latest
    - gpt-oss-120b/latest
    - deepseek-v4-flash/latest
    - qwen3.6-35b-a3b/latest
    - qwen3-235b-a22b-fp8/latest
  tasks:
    parse_query:
      model: gpt-oss-20b/latest
      max_tokens: 3000
      temperature: 0.1
      json: true
      timeout_s: 35
    extract_entities:
      model: gpt-oss-20b/latest
      escalate_model: gpt-oss-120b/latest
      max_tokens: 4000
      temperature: 0.1
      json: true
      timeout_s: 90
    bind_numbers:
      model: gpt-oss-20b/latest
      max_tokens: 2000
      temperature: 0.0
      json: true
      timeout_s: 60
    synthesize_answer:
      model: deepseek-v4-flash/latest
      fallback_model: gpt-oss-120b/latest
      max_tokens: 3500
      temperature: 0.3
      stream: true
      timeout_s: 90
    judge_contradiction:
      model: gpt-oss-120b/latest
      max_tokens: 3000
      temperature: 0.1
      json: true
      timeout_s: 120
    suggest_aliases:
      model: qwen3.6-35b-a3b/latest
      max_tokens: 1500
      temperature: 0.2
      json: true
      timeout_s: 60
  concurrency:
    interactive: 8
    batch: 4
