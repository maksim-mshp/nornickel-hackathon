llm:
  default_provider: yandex
  log_prompts: false
  providers:
    yandex:
      base_url: https://ai.api.cloud.yandex.net/v1
      auth_scheme: api-key
  allowlist:
    - gpt-oss-20b/latest
    - gpt-oss-120b/latest
    - deepseek-v4-flash/latest
    - qwen3.6-35b-a3b/latest
    - qwen3-235b-a22b-fp8/latest
  tasks:
    parse_query:
      model: gpt-oss-20b/latest
      max_tokens: 3000
      temperature: 0.1
      json: true
      timeout_s: 20
    extract_entities:
      model: gpt-oss-20b/latest
      escalate_model: gpt-oss-120b/latest
      max_tokens: 4000
      temperature: 0.1
      json: true
      timeout_s: 90
    bind_numbers:
      model: gpt-oss-20b/latest
      max_tokens: 2000
      temperature: 0.0
      json: true
      timeout_s: 60
    synthesize_answer:
      model: deepseek-v4-flash/latest
      fallback_model: gpt-oss-120b/latest
      max_tokens: 3500
      temperature: 0.3
      stream: true
      timeout_s: 90
    judge_contradiction:
      model: gpt-oss-120b/latest
      max_tokens: 3000
      temperature: 0.1
      json: true
      timeout_s: 120
    suggest_aliases:
      model: qwen3.6-35b-a3b/latest
      max_tokens: 1500
      temperature: 0.2
      json: true
      timeout_s: 60
  concurrency:
    interactive: 8
    batch: 4
