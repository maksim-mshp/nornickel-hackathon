name: kmap

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: 50m
      max-file: "3"

x-goservice: &goservice
  restart: unless-stopped
  networks: [internal]
  volumes:
    - ../../configs:/configs:ro
  command: ["--config", "/configs", "--env", "prod"]
  mem_limit: 256m
  cpus: 1.0
  <<: *logging

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks: [edge, internal]
    depends_on:
      gateway:
        condition: service_healthy
      ui:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    <<: *logging

  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    networks: [internal]
    environment:
      POSTGRES_USER: kmap
      POSTGRES_DB: kmap
    secrets:
      - source: postgres_password
        target: /run/secrets/postgres_password
    entrypoint: ["/bin/sh", "-c", "export POSTGRES_PASSWORD=\"$$(cat /run/secrets/postgres_password)\"; exec docker-entrypoint.sh postgres"]
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmap -d kmap"]
      interval: 5s
      timeout: 3s
      retries: 10
    <<: *logging

  nats:
    image: nats:2.12-alpine
    restart: unless-stopped
    networks: [internal]
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    <<: *logging

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    networks: [internal]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: kmap
    secrets:
      - source: minio_password
        target: /run/secrets/minio_password
    entrypoint: ["/bin/sh", "-c", "export MINIO_ROOT_PASSWORD=\"$$(cat /run/secrets/minio_password)\"; exec minio server /data --console-address :9001"]
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    <<: *logging

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    restart: unless-stopped
    networks: [internal]
    command: ["start", "--optimized", "--import-realm"]
    environment:
      KC_HEALTH_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
    volumes:
      - ../keycloak/realm-kmap.json:/opt/keycloak/data/import/realm-kmap.json:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 45s
    <<: *logging

  gateway:
    image: kmap-gateway:latest
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      answer:
        condition: service_healthy
      search:
        condition: service_healthy
      catalog:
        condition: service_healthy
      ingest:
        condition: service_healthy
      epistemic:
        condition: service_healthy
    networks: [edge, internal]
    restart: unless-stopped
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "prod"]
    mem_limit: 256m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    <<: *logging

  ingest:
    image: kmap-ingest:latest
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8091/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    <<: *goservice

  catalog:
    image: kmap-catalog:latest
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8092/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    <<: *goservice

  llm:
    image: kmap-llm:latest
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8094/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    <<: *goservice

  search:
    image: kmap-search:latest
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8093/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    <<: *goservice

  answer:
    image: kmap-answer:latest
    depends_on:
      postgres:
        condition: service_healthy
      search:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8095/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    <<: *goservice

  epistemic:
    image: kmap-epistemic:latest
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8096/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    <<: *goservice

  embed:
    image: kmap-embed:latest
    restart: unless-stopped
    networks: [internal]
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "prod"]
    mem_limit: 1g
    cpus: 1.5
    <<: *logging

  parse:
    image: kmap-parse:latest
    restart: unless-stopped
    networks: [internal]
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "prod"]
    mem_limit: 2g
    cpus: 2.0
    <<: *logging

  extract:
    image: kmap-extract:latest
    restart: unless-stopped
    networks: [internal]
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "prod"]
    mem_limit: 2g
    cpus: 2.0
    <<: *logging

  ui:
    image: kmap-ui:latest
    restart: unless-stopped
    networks: [edge, internal]
    depends_on:
      gateway:
        condition: service_healthy
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    <<: *logging

  backup:
    image: kmap-backup:latest
    build:
      context: ./backup
    restart: unless-stopped
    networks: [internal]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    secrets:
      - postgres_password
      - offvm_rclone
    <<: *logging

networks:
  edge:
  internal:
    internal: true

volumes:
  pg_data:
  nats_data:
  minio_data:
  caddy_data:
  caddy_config:

secrets:
  postgres_password:
    file: ../../configs/secrets/postgres_password
  minio_password:
    file: ../../configs/secrets/minio_password
  offvm_rclone:
    file: ../../configs/secrets/offvm_rclone.conf
