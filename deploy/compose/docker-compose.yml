name: kmap

services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: kmap
      POSTGRES_PASSWORD: kmap
      POSTGRES_DB: kmap
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmap -d kmap"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  nats:
    image: nats:2.12-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: kmap
      MINIO_ROOT_PASSWORD: kmap-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 kmap kmap-minio-secret &&
      mc mb -p local/kmap-raw local/kmap-docir local/kmap-bundles local/kmap-exports &&
      mc version enable local/kmap-raw"

  migrate:
    image: migrate/migrate:latest
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../db/migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "postgres://kmap:kmap@postgres:5432/kmap?sslmode=disable", "up"]

  seed:
    image: pgvector/pgvector:pg18
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ../../db/seeds:/seeds:ro
    entrypoint: ["psql", "postgres://kmap:kmap@postgres:5432/kmap?sslmode=disable", "-v", "ON_ERROR_STOP=1", "-f", "/seeds/demo.sql"]
    restart: "no"

  gateway:
    build:
      context: ../..
      args:
        SERVICE: gateway
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    ports:
      - "8080:8080"
    restart: unless-stopped

  ingest:
    build:
      context: ../..
      args:
        SERVICE: ingest
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    restart: unless-stopped

  catalog:
    build:
      context: ../..
      args:
        SERVICE: catalog
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    restart: unless-stopped

  llm:
    build:
      context: ../..
      args:
        SERVICE: llm
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    restart: unless-stopped

  search:
    build:
      context: ../..
      args:
        SERVICE: search
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    restart: unless-stopped

  answer:
    build:
      context: ../..
      args:
        SERVICE: answer
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    restart: unless-stopped

  epistemic:
    build:
      context: ../..
      args:
        SERVICE: epistemic
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    restart: unless-stopped

  parse:
    build:
      context: ../../services/parse
    profiles: [app]
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    restart: unless-stopped

  extract:
    build:
      context: ../../services/extract
    profiles: [app]
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    restart: unless-stopped

  ui:
    build:
      context: ../../ui
    profiles: [app]
    depends_on:
      - gateway
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  pg_data:
  nats_data:
  minio_data:
