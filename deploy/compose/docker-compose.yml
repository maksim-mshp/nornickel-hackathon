name: kmap

services:
  postgres:
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_USER: kmap
      POSTGRES_PASSWORD: kmap
      POSTGRES_DB: kmap
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kmap -d kmap"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  nats:
    image: nats:2.12-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: kmap
      MINIO_ROOT_PASSWORD: kmap-minio-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || curl -sf http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 kmap kmap-minio-secret &&
      mc mb -p local/kmap-raw local/kmap-docir local/kmap-bundles local/kmap-exports &&
      mc version enable local/kmap-raw"

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    profiles: [app]
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    volumes:
      - ../keycloak/realm-kmap.json:/opt/keycloak/data/import/realm-kmap.json:ro
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/9000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 45s
    restart: unless-stopped

  migrate:
    image: migrate/migrate:latest
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../db/migrations:/migrations:ro
    command: ["-path", "/migrations", "-database", "postgres://kmap:kmap@postgres:5432/kmap?sslmode=disable", "up"]

  seed:
    image: pgvector/pgvector:pg18
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ../../db/seeds:/seeds:ro
    entrypoint: ["psql", "postgres://kmap:kmap@postgres:5432/kmap?sslmode=disable", "-v", "ON_ERROR_STOP=1", "-f", "/seeds/demo.sql"]
    restart: "no"

  bootstrap:
    build:
      context: ../..
      args:
        SERVICE: bootstrap
    profiles: [app]
    depends_on:
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ingest:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
      - ../../data-sources:/data-sources:ro
    command: ["--config", "/configs", "--env", "demo"]
    restart: "no"

  gateway:
    build:
      context: ../..
      args:
        SERVICE: gateway
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      answer:
        condition: service_healthy
      search:
        condition: service_healthy
      catalog:
        condition: service_healthy
      ingest:
        condition: service_healthy
      epistemic:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    ports:
      - "8080:8080"
    mem_limit: 256m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  ingest:
    build:
      context: ../..
      args:
        SERVICE: ingest
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    mem_limit: 128m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8091/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  catalog:
    build:
      context: ../..
      args:
        SERVICE: catalog
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    mem_limit: 128m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8092/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  llm:
    build:
      context: ../..
      args:
        SERVICE: llm
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    mem_limit: 128m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8094/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  search:
    build:
      context: ../..
      args:
        SERVICE: search
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    mem_limit: 128m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8093/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  answer:
    build:
      context: ../..
      args:
        SERVICE: answer
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
      search:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    mem_limit: 128m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8095/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  epistemic:
    build:
      context: ../..
      args:
        SERVICE: epistemic
    profiles: [app]
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    mem_limit: 128m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8096/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  embed:
    build:
      context: ../../services/embed
    profiles: [app]
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    mem_limit: 512m
    cpus: 1.5
    restart: unless-stopped

  parse:
    build:
      context: ../../services/parse
    profiles: [app]
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    mem_limit: 4g
    cpus: 8.0
    restart: unless-stopped

  extract:
    build:
      context: ../../services/extract
    profiles: [app]
    depends_on:
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      llm:
        condition: service_healthy
      embed:
        condition: service_started
    volumes:
      - ../../configs:/configs:ro
    command: ["--config", "/configs", "--env", "demo"]
    mem_limit: 3g
    cpus: 8.0
    restart: unless-stopped

  ui:
    build:
      context: ../../ui
    profiles: [app]
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "3000:3000"
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

volumes:
  pg_data:
  nats_data:
  minio_data:
